name: confluent-lab

services:
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"   # EXTERNAL listener for host clients (tests, local dotnet run)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: INTERNAL://kafka:29092,CONTROLLER://kafka:29093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:29092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 12

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    hostname: schema-registry
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -sf http://localhost:8081/subjects || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12

  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        echo 'Creating topics...'
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic proxy.requests      --partitions 6 --replication-factor 1 --config cleanup.policy=compact
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic service-a.completed --partitions 6 --replication-factor 1 --config cleanup.policy=compact
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic service-b.ready      --partitions 6 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic service-b.dlq        --partitions 6 --replication-factor 1
        echo 'Topics ready:'
        kafka-topics --bootstrap-server kafka:29092 --list
    restart: "no"

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      DYNAMIC_CONFIG_ENABLED: "true"

  service-a-api:
    build:
      context: .
      dockerfile: src/Poc.ServiceA.Api/Dockerfile
    container_name: service-a-api
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
    ports:
      - "5081:8080"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081

  proxy-api:
    build:
      context: .
      dockerfile: src/Poc.Proxy.Api/Dockerfile
    container_name: proxy-api
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
      service-a-api:
        condition: service_started
    ports:
      - "5080:8080"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      ServiceA__BaseUrl: http://service-a-api:8080

  # --- Enricher implementation A: manual KTable-KTable (default). Activate with --profile manual ---
  enricher:
    build:
      context: .
      dockerfile: src/Poc.Enricher.Streams/Dockerfile
    container_name: enricher
    profiles: ["manual"]
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
    ports:
      - "5082:8080"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      Enricher__StatePath: /data/enricher.db
    volumes:
      - enricher-state:/data

  # --- Enricher implementation B: Streamiz KTable-KTable DSL. Activate with --profile streamiz ---
  # Run only ONE enricher at a time: both consume the inputs and produce to service-b.ready.
  enricher-streamiz:
    build:
      context: .
      dockerfile: src/Poc.Enricher.Streamiz/Dockerfile
    container_name: enricher-streamiz
    profiles: ["streamiz"]
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
    ports:
      - "5082:8080"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081

  service-b-worker:
    build:
      context: .
      dockerfile: src/Poc.ServiceB.Worker/Dockerfile
    container_name: service-b-worker
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
    ports:
      - "5083:8080"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081

volumes:
  enricher-state:
